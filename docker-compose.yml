services:

  # ─── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-app
    restart: unless-stopped
    env_file: .env
    environment:
      PHP_OPCACHE_ENABLE: 1
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: conservicos-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9991}:80"
    volumes:
      - .:/var/www/html:ro
      - storage_data:/var/www/html/storage/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - conservicos
    depends_on:
      - app

  # ─── MySQL 8 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: conservicos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-conservicos}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - conservicos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: conservicos-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - conservicos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-queue
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --timeout=300
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ─── Scheduler (Laravel cron) ───────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-scheduler
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  conservicos:
    driver: bridge
