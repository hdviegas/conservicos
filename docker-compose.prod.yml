services:
  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro

  queue:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro

  scheduler:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro

  nginx:
    ports:
      - "127.0.0.1:${APP_PORT:-9991}:80"
    volumes:
      - storage_data:/var/www/html/storage/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    ports: []

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6381}:6379"
