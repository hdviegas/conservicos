services:
  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: !reset
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage/app

  queue:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: !reset
      - storage_data:/var/www/html/storage/app

  scheduler:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: !reset
      - storage_data:/var/www/html/storage/app

  nginx:
    ports: !reset
      - "127.0.0.1:${APP_PORT:-9991}:80"
    volumes: !reset
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    ports: !reset []

  redis:
    ports: !reset
      - "127.0.0.1:${REDIS_HOST_PORT:-6381}:6379"

volumes:
  public_data:
    driver: local
