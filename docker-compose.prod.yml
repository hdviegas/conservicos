services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      PHP_OPCACHE_ENABLE: 1
    volumes:
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: conservicos-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-9991}:80"
    volumes:
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - conservicos
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: conservicos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-conservicos}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-secret-change-me}
      MYSQL_USER: ${MYSQL_APP_USERNAME:-conservicos_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-app-secret-change-me}
      MYSQL_ROOT_HOST: "%"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
      MYSQL_ONETIME_PASSWORD: "false"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - conservicos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root-secret-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: conservicos-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    networks:
      - conservicos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-queue
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600 --timeout=300
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: conservicos-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - conservicos
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
  public_data:
    driver: local

networks:
  conservicos:
    driver: bridge
